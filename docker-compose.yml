services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data

  coturn:
    image: coturn/coturn
    network_mode: host
    command: >
      -n
      --log-file=stdout
      --realm=messenger.local
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --no-tlsv1
      --no-tlsv1_1
      --min-port=49152
      --max-port=65535

volumes:
  pgdata:
  miniodata:
